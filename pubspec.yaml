name: kana_trainer
description: "Japanese kana (50-on) practice app: see a kana, type its romaji."
publish_to: 'none'
version: 2.6.1+11

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  flutter_timezone: ^4.1.0
  flutter_tts: ^4.2.0
  http: ^1.2.0
  shared_preferences: ^2.3.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-400.ttf
          weight: 400
        - asset: assets/fonts/ZenKakuGothicNew-500.ttf
          weight: 500
        - asset: assets/fonts/ZenKakuGothicNew-700.ttf
          weight: 700
        - asset: assets/fonts/ZenKakuGothicNew-900.ttf
          weight: 900
