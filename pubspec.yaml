name: kana_trainer
description: "Japanese kana (50-on) practice app: see a kana, type its romaji."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_tts: ^4.2.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-400.ttf
          weight: 400
        - asset: assets/fonts/ZenKakuGothicNew-500.ttf
          weight: 500
        - asset: assets/fonts/ZenKakuGothicNew-700.ttf
          weight: 700
        - asset: assets/fonts/ZenKakuGothicNew-900.ttf
          weight: 900
